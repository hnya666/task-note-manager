<!DOCTYPE html>
<html lang="en" ng-app="taskApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal task & note manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="node_modules/angular/angular.js"></script>
    <script src="node_modules/angular-route/angular-route.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar" ng-controller="NavCtrl">
            <div class="sidebar-brand">
                <div class="brand-mark">TN</div>
                <div>
                    <div class="brand-title">Task & Note Manager</div>
                    <div class="brand-subtitle">Modern student productivity</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#!/home" class="sidebar-link" ng-class="{ 'active-link': currentPath() === '/home' }">
                    <span class="nav-icon">🏠</span>
                    <span>Dashboard</span>
                </a>
                <a href="#!/notes" class="sidebar-link" ng-class="{ 'active-link': currentPath() === '/notes' }">
                    <span class="nav-icon">📝</span>
                    <span>Notes</span>
                </a>
                <a href="#!/tasks" class="sidebar-link" ng-class="{ 'active-link': currentPath() === '/tasks' }">
                    <span class="nav-icon">✅</span>
                    <span>Tasks</span>
                </a>
                <a href="#!/search" class="sidebar-link" ng-class="{ 'active-link': currentPath() === '/search' }">
                    <span class="nav-icon">🔍</span>
                    <span>Search</span>
                </a>
            </nav>

        </aside>

        <main class="app-content">
            <header class="topbar">
                <div>
                    <div class="topbar-label">Task & Note Manager</div>
                    <div class="topbar-note">Pastel productivity dashboard for your college project.</div>
                </div>
            </header>

            <div class="view-container">
                <div ng-view></div>
            </div>
        </main>
    </div>
</body>
</html>
